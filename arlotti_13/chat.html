<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modulo + JSON</title>
  <style>
    input {
      border-block-color: rgb(209, 108, 108);
    }
  </style>

</head>
<body>

  <h2>Carica file JSON</h2>
  <input type="file" id="fileInput" accept=".json">

  <h2>Aggiungi nuovo oggetto</h2>
  <form id="form1">
    <input class="dimamico" name="titolo" placeholder="Titolo" required onclick="cambia_colore()"><br>
    <input class="dimamico" name="autore" placeholder="autore" required onclick="cambia_colore()"><br>
    <button type="submit">Aggiungi e scarica JSON</button>
  </form>
  <script src="js.js"></script>
</body>
</html>
