<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modulo + JSON</title>
</head>

<body>

  <h1>Registra studente</h1>

<form id="form">
  <label for="nome">Nome:</label>
  <input type="text" id="nome" placeholder="nome"><br>

  <label for="cognome">Cognome:</label>
  <input type="text" id="cognome" placeholder="cognome"><br>

  <label for="data_nascita">Data di nascita:</label>
  <input type="date" id="data_nascita" placeholder="data di nascita"><br>

  <label for="codice_fiscale">Codice fiscale:</label>
  <input type="text" id="codice_fiscale" placeholder="codice fiscale" ><br>

  <label for="classe">Classe:</label>
  <select id="classe"><br>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="G">G</option>
    <option value="H">H</option>
    <option value="I">I</option>
    <option value="J">J</option>
    <option value="K">K</option>
    <option value="L">L</option>
    <option value="M">M</option>
    <option value="N">N</option>
    <option value="O">O</option>
    <option value="P">P</option>
    <option value="Q">Q</option>
    <option value="R">R</option>
    <option value="S">S</option>
    <option value="T">T</option>
    <option value="U">U</option>
    <option value="V">V</option>
    <option value="W">W</option>
    <option value="X">X</option>
    <option value="Y">Y</option>
    <option value="Z">Z</option>
    
  </select>

  <label for="sezione">Sezione:</label>
  <input type="number" id="sezione" min="1" max="5"><br>

  <label for="bocciato">Bocciato:</label>
  <input type="checkbox" id="bocciato"><br>

  <label for="anni_ripetuti">Anni ripetuti:</label>
  <input type="number" id="anni_ripetuti" min="0" value="0"><br>

  <label for="uscita">Uscita:</label>
  <select id="uscita">
    <option value="lavoro">lavoro</option>
    <option value="università">università</option>
  </select>

  <button type="submit">Aggiungi studente</button>
</form>

    </script>
</body>
</html>
