<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modulo + JSON</title>
</head>

<body>

  <h1>Registra studente</h1>

<form id="form">
  <label for="nome">Nome:</label>
  <input type="text" id="nome" placeholder="nome"><br>

  <label for="cognome">Cognome:</label>
  <input type="text" id="cognome" placeholder="cognome"><br>

  <label for="data_nascita">Data di nascita:</label>
  <input type="date" id="data_nascita" placeholder="data di nascita"><br>

  <label for="codice_fiscale">Codice fiscale:</label>
  <input type="text" id="codice_fiscale" placeholder="codice fiscale" ><br>

  <label for="classe">Classe:</label>
  <select id="classe"><br>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
    <option value="E">E</option>
    <option value="F">F</option>
    <option value="G">G</option>
    <option value="H">H</option>
    <option value="I">I</option>
    <option value="J">J</option>
    <option value="K">K</option>
    <option value="L">L</option>
    <option value="M">M</option>
    <option value="N">N</option>
    <option value="O">O</option>
    <option value="P">P</option>
    <option value="Q">Q</option>
    <option value="R">R</option>
    <option value="S">S</option>
    <option value="T">T</option>
    <option value="U">U</option>
    <option value="V">V</option>
    <option value="W">W</option>
    <option value="X">X</option>
    <option value="Y">Y</option>
    <option value="Z">Z</option>
    
  </select>

  <label for="sezione">Sezione:</label>
  <input type="number" id="sezione"><br>

  <label for="bocciato">Bocciato:</label>
  <input type="checkbox" id="bocciato"><br>

  <label for="anni_ripetuti">Anni ripetuti:</label>
  <input type="number" id="anni_ripetuti"><br>

  <label for="uscita">Uscita:</label>
  <select id="uscita">
    <option value="lavoro">lavoro</option>
    <option value="università">università</option>
  </select>

  <button onclick="controlla()" type="submit">Aggiungi studente</button>
</form>

    <script>
      function controlla() {
      let nome_form = document.getElementById("nome").value;
      let nome_valido;

      if (nome_form.length <= 30 && nome_form.length > 0) {
        nome_valido = true;
      } else {
        nome_valido = false;
      }
    
      let cognome_form = document.getElementById("cognome").value;
      let cognome_valido;
    
      if (cognome_form.length <= 30 && cognome_form.length > 0) {
        cognome_valido = true;
      } else {
        cognome_valido = false; // (lasciato come nel tuo codice)
      }
    
      let codice_form = document.getElementById("codice_fiscale").value;
      let codice_fiscale;
    
      if (codice_form.length == 16) {
        codice_fiscale = true;
      } else {
        codice_fiscale = false;
      }
    
      let sezione_form = document.getElementById("sezione").value;
      let sezione;
    
      if (sezione_form <= 5 && sezione_form >= 1) {
        sezione = true;
      } else {
        sezione = false;
      }
    
      let bocciato = document.getElementById("bocciato").value;
    
      let anni_ripetuti_form = document.getElementById("anni_ripetuti").value;
      let anni_ripetuti;
    
      if (anni_ripetuti_form <= 99 && anni_ripetuti_form >= 1) {
        anni_ripetuti = true;
      } else {
        anni_ripetuti = false;
      }
    
      document.write("<p>nome_valido VALIDO:" + nome_valido + "</p>");
      document.write("<p>cognome_valido VALIDO:" + cognome_valido + "</p>");
      document.write("<p>codice_fiscale VALIDO:" + codice_fiscale + "</p>");
      document.write("<p>sezione VALIDO:" + sezione + "</p>");
      document.write("<p>bocciato VALIDO:" + bocciato + "</p>");
      document.write("<p>anni_ripetuti VALIDO:" + anni_ripetuti + "</p>");
    }
    </script>
</body>
</html>
