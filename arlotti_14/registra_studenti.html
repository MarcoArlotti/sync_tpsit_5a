<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Modulo + JSON</title>
  <style>
    input {
      border-style: "green";
    }
  </style>
</head>

<body>

  <h1>Registra studente</h1>

<form id="form" onsubmit="controlla()">
  <label for="nome">Nome:</label>
  <input type="text" id="nome" placeholder="nome"><br>

  <label for="cognome">Cognome:</label>
  <input type="text" id="cognome" placeholder="cognome"><br>

  <label for="data_nascita">Data di nascita:</label>
  <input type="date" id="data_nascita" placeholder="data di nascita"><br>

  <label for="codice_fiscale">Codice fiscale:</label>
  <input type="text" id="codice_fiscale" placeholder="codice fiscale" ><br>

  <label for="sezione">sezione:</label>
  <input type="text" id="sezione" placeholder="inserisci la sezione" ><br>

  <label for="anno_scolastico">anno scolastico:</label>
  <input type="number" id="anno_scolastico"><br>

  <label for="bocciato">Bocciato:</label>
  <input type="checkbox" id="bocciato"><br>

  <label for="anni_ripetuti">Anni ripetuti:</label>
  <input type="number" id="anni_ripetuti" value="0"><br>

  <label for="uscita">Uscita:</label>
  <select id="uscita">
    <option value="lavoro">lavoro</option>
    <option value="università">università</option>
  </select>

  <button type="submit">Aggiungi studente</button>
</form>

    <script>
      function controlla() {
      event.preventDefault();
      let nome_form = document.getElementById("nome").value;
      let nome_valido;

      if (nome_form.length <= 30 && nome_form.length > 0) {
        nome_valido = true;
      } else {
        nome_valido = false;
      }
    
      let cognome_form = document.getElementById("cognome").value;
      let cognome_valido;
    
      if (cognome_form.length <= 30 && cognome_form.length > 0) {
        cognome_valido = true;
      } else {
        cognome_valido = false; // (lasciato come nel tuo codice)
      }
    
      let codice_form = document.getElementById("codice_fiscale").value;
      let codice_fiscale;
    
      if (codice_form.length == 16) {
        codice_fiscale = true;
      } else {
        codice_fiscale = false;
      }
    
      let anno_scolastico_form = document.getElementById("anno_scolastico").value;
      let anno_scolastico;
    
      if (anno_scolastico_form <= 5 && anno_scolastico_form >= 1) {
        anno_scolastico = true;
      } else {
        anno_scolastico = false;
      }
    
      let anni_ripetuti_form = document.getElementById("anni_ripetuti").value;
      let anni_ripetuti;
    
      if (anni_ripetuti_form <= 99 && anni_ripetuti_form >= 0) {
        anni_ripetuti = true;
      } else {
        anni_ripetuti = false;
      }
      
      let sezione = document.getElementById("sezione").value;
      let sezione_form;

      if (sezione.length == 1) {
        sezione_form = true;
      } else {
        sezione_form = false;
      }

      let data = document.getElementById("data_nascita").value;
      let data_valida
      
      if (data) {
        data_valida = true;
      } else {
        data_valida = false;
      }

      if (nome_valido) {
        document.getElementById("nome").style.borderColor = "green";
      } else {
        document.getElementById("nome").style.borderColor = "red";
      }
      
      if (cognome_valido) {
        document.getElementById("cognome").style.borderColor = "green";
      } else {
        document.getElementById("cognome").style.borderColor = "red";
      }

      if (codice_fiscale) {
        document.getElementById("codice_fiscale").style.borderColor = "green";
      } else {
        document.getElementById("codice_fiscale").style.borderColor = "red";
      }

      if (anno_scolastico) {
        document.getElementById("anno_scolastico").style.borderColor = "green";
      } else {
        document.getElementById("anno_scolastico").style.borderColor = "red";
      }

      if (anni_ripetuti) {
        document.getElementById("anni_ripetuti").style.borderColor = "green";
      } else {
        document.getElementById("anni_ripetuti").style.borderColor = "red";
      }

      if (sezione_form) {
        document.getElementById("sezione").style.borderColor = "green";
      } else {
        document.getElementById("sezione").style.borderColor = "red";
      }

      if (data_valida) {
        document.getElementById("data_nascita").style.borderColor = "green";
      } else {
        document.getElementById("data_nascita").style.borderColor = "red";
      }
      //return false non cambia pagina
      return false;
    }
    </script>
</body>
</html>
